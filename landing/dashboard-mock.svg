      <stop offset="100%" stop-color="#050811"/>
    </linearGradient>
    <radialGradient id="ice-glow" cx="20%" cy="0%" r="60%">
      <stop offset="0%" stop-color="rgba(79,195,247,0.10)"/>
      <stop offset="100%" stop-color="rgba(79,195,247,0)"/>
    </radialGradient>
    <radialGradient id="indigo-glow" cx="80%" cy="100%" r="60%">
