<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tourniquet{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <script src="/static/js/htmx.min.js" defer></script>
</head>
<body>
  <nav>
    <a href="/dashboard" class="brand">TOURNIQUET</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/dashboard/keys/new">+ New key</a>
    <span class="nav-spacer"></span>
    <a href="/trust" class="trust-badge" title="Click to see exactly what data lives where">🔒 Local only · nothing leaves this {{ device_label(request) }}</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    // Brief "✓ saved" pulse on the autosave hint after any HTMX swap targeting #control-panel.
    // Document-level listener so it survives the swap.
    document.addEventListener('htmx:afterSwap', function(evt) {
      var t = evt.detail && evt.detail.target;
      if (t && t.id === 'control-panel') {
        var hint = t.querySelector('.autosave-hint');
        if (hint) {
          hint.textContent = '✓ saved';
          hint.classList.add('saved');
          setTimeout(function() {
            hint.textContent = 'auto-saves on change';
            hint.classList.remove('saved');
          }, 1400);
        }
      }
    });
  </script>
  {% include "_partials/copy_button_script.html" %}
</body>
</html>
