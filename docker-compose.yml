services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: burnrate
      POSTGRES_PASSWORD: burnrate
      POSTGRES_DB: burnrate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burnrate"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://burnrate:burnrate@db:5432/burnrate
      APP_BASE_URL: http://localhost:8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
    command: uvicorn burnrate.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
