{% extends "base.html" %}
{% block title %}Sign in — BurnRate{% endblock %}
{% block content %}
<section class="auth">
  <h1>Sign in</h1>
  <p>Enter your email and we'll send a one-click sign-in link. No password.</p>
  <form action="/auth/magic-link" method="post"
        hx-post="/auth/magic-link" hx-target="#result" hx-swap="innerHTML">
    <input type="email" name="email" placeholder="you@example.com" required autofocus>
    <button type="submit" class="btn-primary">Send sign-in link</button>
  </form>
  <div id="result"></div>
</section>
{% endblock %}
